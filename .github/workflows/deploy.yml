name: Deploy Solana Program

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'program/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Solana 2.1.21
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v2.1.21/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Setup wallet
        run: |
          mkdir -p ~/.config/solana
          echo '${{ secrets.WALLET_KEYPAIR_JSON }}' > ~/.config/solana/id.json
          solana config set --url https://api.mainnet-beta.solana.com
          solana address
          solana balance

      - name: Generate program keypair
        working-directory: program
        run: |
          mkdir -p target/deploy
          solana-keygen new --no-bip39-passphrase \
            -o target/deploy/kaching_settle-keypair.json --force
          PROGRAM_ID=$(solana address -k target/deploy/kaching_settle-keypair.json)
          echo "PROGRAM_ID=$PROGRAM_ID" >> $GITHUB_ENV
          echo "Program ID: $PROGRAM_ID"

      - name: Update program ID
        working-directory: program
        run: |
          PROGRAM_ID=$(solana address -k target/deploy/kaching_settle-keypair.json)
          sed -i "s/11111111111111111111111111111111/$PROGRAM_ID/g" \
            programs/kaching-settle/src/lib.rs Anchor.toml
          echo "Updated to: $PROGRAM_ID"

      - name: Pin dependencies to Rust 1.79 compatible versions
        working-directory: program
        run: |
          # Generate initial Cargo.lock
          cargo generate-lockfile || true
          # Pin each problematic crate to last version before edition2024
          cargo update -p zeroize_derive --precise 1.4.2 || true
          cargo update -p cpufeatures --precise 0.2.12 || true
          cargo update -p toml_datetime --precise 0.6.3 || true
          cargo update -p crypto-common --precise 0.1.6 || true
          cargo update -p hashbrown --precise 0.14.5 || true
          cargo update -p digest --precise 0.10.7 || true
          cargo update -p signature --precise 2.1.0 || true
          echo "Lockfile generated with pinned deps" 

      - name: Build
        working-directory: program
        run: |
          cargo-build-sbf --manifest-path programs/kaching-settle/Cargo.toml
          echo "Build artifacts:"
          find . -name "*.so" 2>/dev/null

      - name: Deploy
        working-directory: program
        run: |
          SO=$(find . -name "kaching_settle.so" | head -1)
          echo "Deploying: $SO"
          solana program deploy "$SO" \
            --program-id target/deploy/kaching_settle-keypair.json \
            --url https://api.mainnet-beta.solana.com
          echo "======================================"
          echo "PROGRAM ID: ${{ env.PROGRAM_ID }}"
          echo "======================================"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: program-artifacts
          path: |
            program/target/deploy/kaching_settle-keypair.json
