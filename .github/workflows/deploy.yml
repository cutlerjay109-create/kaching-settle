name: Deploy Solana Program

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'program/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85.0"

      - name: Install Solana
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v2.1.21/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/coral-xyz/anchor \
            --tag v0.30.1 anchor-cli --locked
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Verify tools
        run: |
          rustc --version
          solana --version
          anchor --version

      - name: Setup wallet
        run: |
          mkdir -p ~/.config/solana
          echo '${{ secrets.WALLET_KEYPAIR_JSON }}' > ~/.config/solana/id.json
          solana config set --url https://api.mainnet-beta.solana.com
          echo "Deployer:"
          solana address
          echo "Balance:"
          solana balance

      - name: Generate program keypair
        working-directory: program
        run: |
          mkdir -p target/deploy
          solana-keygen new --no-bip39-passphrase \
            -o target/deploy/kaching_settle-keypair.json --force
          PROGRAM_ID=$(solana address -k target/deploy/kaching_settle-keypair.json)
          echo "PROGRAM_ID=$PROGRAM_ID" >> $GITHUB_ENV
          echo "Program ID: $PROGRAM_ID"

      - name: Update program ID in source
        working-directory: program
        run: |
          PROGRAM_ID=$(solana address -k target/deploy/kaching_settle-keypair.json)
          sed -i "s/11111111111111111111111111111111/$PROGRAM_ID/g" \
            programs/kaching-settle/src/lib.rs Anchor.toml
          echo "Updated to: $PROGRAM_ID"

      - name: Build
        working-directory: program
        run: |
          anchor build
          echo "Build artifacts:"
          find . -name "*.so" 2>/dev/null
          find . -name "kaching_settle.json" 2>/dev/null

      - name: Deploy
        working-directory: program
        run: |
          SO=$(find . -name "kaching_settle.so" | head -1)
          echo "Deploying: $SO"
          solana program deploy "$SO" \
            --program-id target/deploy/kaching_settle-keypair.json \
            --url https://api.mainnet-beta.solana.com
          echo "======================================"
          echo "PROGRAM ID: ${{ env.PROGRAM_ID }}"
          echo "======================================"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: program-artifacts
          path: |
            program/target/idl/kaching_settle.json
            program/target/deploy/kaching_settle-keypair.json
