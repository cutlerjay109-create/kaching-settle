name: Deploy Solana Program

on:
  push:
    branches: [main]
    paths:
      - 'program/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Solana
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v2.1.21/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
          key: ${{ runner.os }}-cargo-anchor-0.30.1

      - name: Install Anchor CLI
        run: |
          if ! command -v anchor &> /dev/null; then
            cargo install --git https://github.com/coral-xyz/anchor \
              --tag v0.30.1 anchor-cli --locked --force
          fi
          anchor --version

      - name: Setup wallet
        run: |
          mkdir -p ~/.config/solana
          echo '${{ secrets.WALLET_KEYPAIR_JSON }}' > ~/.config/solana/id.json
          solana config set --url mainnet-beta
          solana address

      - name: Check SOL balance
        run: solana balance

      - name: Build program
        working-directory: program
        run: |
          anchor build
          ls -la target/deploy/

      - name: Deploy program
        working-directory: program
        run: |
          anchor deploy --provider.cluster mainnet-beta
          PROGRAM_ID=$(solana address -k target/deploy/kaching_settle-keypair.json)
          echo "=============================="
          echo "PROGRAM ID: $PROGRAM_ID"
          echo "=============================="
          echo "PROGRAM_ID=$PROGRAM_ID" >> $GITHUB_ENV

      - name: Print program ID
        run: |
          echo "Deploy complete!"
          echo "Program ID: ${{ env.PROGRAM_ID }}"
          echo "Add this to shared/config.js settleProgramId"
