name: Deploy Solana Program

on:
  push:
    branches: [main]
    paths:
      - 'program/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Solana
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v2.1.21/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Anchor
        run: |
          cargo install --git https://github.com/coral-xyz/anchor \
            --tag v0.30.1 anchor-cli --locked

      - name: Setup wallet
        run: |
          mkdir -p ~/.config/solana
          echo '${{ secrets.WALLET_KEYPAIR_JSON }}' > ~/.config/solana/id.json
          solana config set --url mainnet-beta
          solana address

      - name: Build program
        working-directory: program
        run: anchor build

      - name: Deploy program
        working-directory: program
        run: |
          anchor deploy --provider.cluster mainnet
          echo "Program deployed successfully"

      - name: Save program ID
        working-directory: program
        run: |
          PROGRAM_ID=$(solana address -k target/deploy/kaching_settle-keypair.json)
          echo "PROGRAM_ID=$PROGRAM_ID" >> $GITHUB_ENV
          echo "Program ID: $PROGRAM_ID"

      - name: Update config
        run: |
          echo "Program ID: ${{ env.PROGRAM_ID }}"
          echo "Copy this into shared/config.js settleProgramId field"
