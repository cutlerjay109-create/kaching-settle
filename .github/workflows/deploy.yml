name: Deploy Solana Program

on:
  push:
    branches: [main]
    paths:
      - 'program/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    container:
      image: projectserum/build:v0.27.0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tools
        run: |
          anchor --version
          solana --version
          rustc --version

      - name: Setup wallet
        run: |
          mkdir -p ~/.config/solana
          echo '${{ secrets.WALLET_KEYPAIR_JSON }}' > ~/.config/solana/id.json
          solana config set --url mainnet-beta
          solana address

      - name: Check SOL balance
        run: solana balance

      - name: Build program
        working-directory: program
        run: anchor build

      - name: Deploy program
        working-directory: program
        run: |
          anchor deploy --provider.cluster mainnet-beta
          PROGRAM_ID=$(solana address -k target/deploy/kaching_settle-keypair.json)
          echo "=============================="
          echo "PROGRAM ID: $PROGRAM_ID"
          echo "=============================="
