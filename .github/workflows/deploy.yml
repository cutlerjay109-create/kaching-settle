name: Deploy Solana Program

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'program/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Solana + Anchor (prebuilt)
        uses: metadaoproject/setup-anchor@v3.1
        with:
          anchor-version: "0.30.1"
          solana-cli-version: "2.1.21"
          node-version: "20"

      - name: Verify tools
        run: |
          solana --version
          anchor --version

      - name: Setup wallet
        run: |
          mkdir -p ~/.config/solana
          echo '${{ secrets.WALLET_KEYPAIR_JSON }}' > ~/.config/solana/id.json
          solana config set --url https://api.mainnet-beta.solana.com
          echo "Deployer address:"
          solana address
          echo "Balance:"
          solana balance

      - name: Generate program keypair
        working-directory: program
        run: |
          mkdir -p target/deploy
          solana-keygen new --no-bip39-passphrase             -o target/deploy/kaching_settle-keypair.json --force
          PROGRAM_ID=$(solana address -k target/deploy/kaching_settle-keypair.json)
          echo "PROGRAM_ID=$PROGRAM_ID" >> $GITHUB_ENV
          echo "Program ID: $PROGRAM_ID"

      - name: Update program ID in source
        working-directory: program
        run: |
          PROGRAM_ID=$(solana address -k target/deploy/kaching_settle-keypair.json)
          sed -i "s/11111111111111111111111111111111/$PROGRAM_ID/g" src/lib.rs
          sed -i "s/11111111111111111111111111111111/$PROGRAM_ID/g" Anchor.toml
          echo "Updated to: $PROGRAM_ID"

      - name: Build
        working-directory: program
        run: |
          anchor build
          echo "Build output:"
          find . -name "*.so" 2>/dev/null
          find . -name "kaching_settle*" 2>/dev/null

      - name: Deploy
        working-directory: program
        run: |
          # Find the .so file wherever anchor put it
          SO_FILE=$(find . -name "kaching_settle.so" | head -1)
          echo "Found .so at: $SO_FILE"
          solana program deploy             "$SO_FILE"             --program-id target/deploy/kaching_settle-keypair.json             --url https://api.mainnet-beta.solana.com
          echo "======================================"
          echo "DEPLOYED PROGRAM ID: ${{ env.PROGRAM_ID }}"
          echo "======================================"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: program-artifacts
          path: |
            program/target/idl/kaching_settle.json
            program/target/deploy/kaching_settle-keypair.json
