[toolchain]
anchor_version = "0.30.1"

[features]
resolution = true
skip-lint = false

[workspace]
members = ["programs/kaching-settle"]

[programs.mainnet]
kaching_settle = "11111111111111111111111111111111"

[provider]
cluster = "mainnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
