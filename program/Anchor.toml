[features]
resolution = "workspace"
skip-lint = false

[programs.mainnet]
kaching_settle = "PLACEHOLDER_PROGRAM_ID"

[programs.devnet]
kaching_settle = "PLACEHOLDER_PROGRAM_ID"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "mainnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
